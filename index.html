<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<div id="data-container"></div>
<script>
  function renderTable(data) {
    const table = document.createElement('table');
    const header = table.createTHead();
    const row = header.insertRow();

    // Create table headers
    for (const key in data[0]) {
      const th = document.createElement('th');
      th.appendChild(document.createTextNode(key));
      row.appendChild(th);
    }

    // Create table body
    const tbody = document.createElement('tbody');
    data.forEach(item => {
      const row = tbody.insertRow();
      for (const key in item) {
        const cell = row.insertCell();
        cell.appendChild(document.createTextNode(item[key]));
      }
    });
    table.appendChild(tbody);
    document.getElementById('data-container').appendChild(table);
  }

  async function loadData() {
    try {
      const response = await fetch('data.json'); // replace with your data source
      const data = await response.json();
      renderTable(data);
    } catch (error) {
      console.error('Error loading data:', error);
    }
  }

  // Load data when the document is ready
  document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
