<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frota Master</title>
    <script>
        let currentPage = 1;
        const recordsPerPage = 25;
        let records = []; // Assuming records are fetched and stored here

        function renderTudo() {
            // Logic to render the records based on currentPage
            const start = (currentPage - 1) * recordsPerPage;
            const end = start + recordsPerPage;
            const paginatedRecords = records.slice(start, end);

            // Render the paginatedRecords to the table (this is pseudo-code)
            // renderToTable(paginatedRecords);

            renderPaginationControls();
        }

        function renderPaginationControls() {
            const totalPages = Math.ceil(records.length / recordsPerPage);
            const paginationDiv = document.getElementById('paginationControls');
            paginationDiv.innerHTML = '';

            for (let i = 1; i <= totalPages; i++) {
                const button = document.createElement('button');
                button.innerText = i;
                button.onclick = () => changePage(i);
                paginationDiv.appendChild(button);
            }
        }

        function changePage(page) {
            currentPage = page;
            renderTudo();
        }
    </script>
</head>
<body>

    <h1>Welcome to Frota Master</h1>
    <table id="data-table">
        <!-- Rows will be populated here -->
    </table>
    <div id="paginationControls"></div>

    <script>
        renderTudo(); // Initial call to render records
    </script>
</body>
</html>
